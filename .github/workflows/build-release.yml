name: Build and Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    name: Test and build application
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag and package version
        if: startsWith(github.ref, 'refs/tags/')
        run: node -e "const tag=process.env.GITHUB_REF_NAME; const version=require('./package.json').version; if(tag !== 'v' + version){console.error('Tag ' + tag + ' does not match package version ' + version); process.exit(1)}"

      - name: Run checks
        run: npm run check

  container:
    name: Build and publish container
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=Meteor History
            org.opencontainers.image.description=Self-hosted GitHub repository star history and profile cards

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.metadata.outputs.version }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  portable:
    name: Build Linux ${{ matrix.arch }} release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Build application
        run: |
          npm ci
          npm run build
          npm prune --omit=dev

      - name: Assemble portable runtime
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
        run: |
          package_root="$RUNNER_TEMP/meteor-history-package"
          release_root="$GITHUB_WORKSPACE/release"
          mkdir -p "$package_root/bin" "$package_root/runtime" "$package_root/app/src" "$release_root"
          cp -L "$(command -v node)" "$package_root/runtime/node"
          cp -R server dist node_modules "$package_root/app/"
          cp src/monotonePath.js "$package_root/app/src/"
          cp package.json package-lock.json "$package_root/app/"
          cp scripts/meteor-history-cli.sh "$package_root/bin/meteor-history-cli"
          printf '%s\n' "$GITHUB_REF_NAME" > "$package_root/VERSION"
          cat > "$package_root/bin/meteor-history" <<'LAUNCHER'
          #!/bin/sh
          set -eu
          package_root=$(CDPATH= cd -- "$(dirname -- "$0")/.." && pwd)
          exec "$package_root/runtime/node" "$package_root/app/server/index.js"
          LAUNCHER
          chmod 755 "$package_root/bin/meteor-history" "$package_root/bin/meteor-history-cli" "$package_root/runtime/node"
          tar -C "$package_root" -czf "$release_root/meteor-history-linux-$RELEASE_ARCH.tar.gz" .

      - name: Smoke test portable runtime
        run: |
          package_root="$RUNNER_TEMP/meteor-history-package"
          log_file="$RUNNER_TEMP/meteor-history-smoke.log"
          HOST=127.0.0.1 PORT=18765 CACHE_DIR="$RUNNER_TEMP/meteor-history-smoke-cache" \
            "$package_root/bin/meteor-history" >"$log_file" 2>&1 &
          service_pid=$!
          trap 'kill "$service_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:18765/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "$log_file"
          exit 1

      - name: Upload portable runtime
        uses: actions/upload-artifact@v6
        with:
          name: meteor-history-linux-${{ matrix.arch }}
          path: release/meteor-history-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - quality
      - container
      - portable
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download portable runtimes
        uses: actions/download-artifact@v7
        with:
          pattern: meteor-history-linux-*
          path: release
          merge-multiple: true

      - name: Generate release checksums
        run: |
          cd release
          sha256sum meteor-history-linux-*.tar.gz > SHA256SUMS

      - name: Create or update release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
          fi
